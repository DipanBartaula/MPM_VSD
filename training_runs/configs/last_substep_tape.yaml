# Warp autodiff variant that keeps only the last substep in tape per MPM step.
phi:
  D:
    init: 0.3
    min: 0.1
    max: 3.0
  E:
    init: 50.0
    min: 0.5
    max: 20.0
  H:
    init: 0.95
    min: 0.8
    max: 1.2
  friction:
    init: 0.3
    min: 0.01
    max: 1.0

mpm_fixed:
  nu: 0.3
  gamma: 300.0
  kappa: 300.0
  friction_angle: 35.0

mpm:
  substep: 200
  grid_size: 100
  fps: 25.0

clip:
  frame_num: 120
  frame_stride_steps: 1
  jitter_range: 2

curriculum:
  clip_frames: 120
  first_stage_iterations: 40
  stage_iterations: 40
  final_random_iterations: 100
  final_random_batch_clips: 8

batch:
  num_videos: 1

render:
  width: 512
  height: 512
  bg_white: true

sds:
  target_resolution: 128
  timestep_min: 50
  timestep_max: 950
  use_amp: true
  num_noise_samples: 4
  prompt: "a person wearing this cloth is moving"

loss:
  lambda_sds: 0.9
  lambda_regularization: 0.1
  lambda_penetration: 0.05
  lambda_stretch: 0.02
  lambda_temporal_smooth: 0.02
  lambda_friction_reg: 0.0
  penetration_margin: 0.005
  max_strain: 0.30

lr:
  D: 0.01
  E: 0.30
  H: 0.01
  friction: 0.0

random_init: true

training:
  n_iterations: 1000
  log_every: 1
  save_every: 100
  video_every: 100
  max_extra_cameras: 16

warp_autodiff:
  taped_substeps_per_frame: 1

logging:
  log_all_perturbation_losses: true
  log_gradients: true
  log_param_trajectory: true
